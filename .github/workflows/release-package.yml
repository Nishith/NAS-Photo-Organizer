name: Release Package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to package, such as v4.1.0"
        required: true
        type: string
      upload:
        description: "Upload Chronoframe-release.zip to the GitHub release"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  package:
    name: Build and upload release package
    runs-on: macos-14
    timeout-minutes: 45
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag }}
      - name: Select Swift 6 toolchain
        run: |
          swift6_developer_dir=""
          for xcode in /Applications/Xcode*.app; do
            swift_binary="$xcode/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/swift"
            if [ -x "$swift_binary" ] && "$swift_binary" -version | grep -Eq 'Swift version 6\.'; then
              swift6_developer_dir="$xcode/Contents/Developer"
            fi
          done
          if [ -z "$swift6_developer_dir" ]; then
            echo "::error title=Swift 6 toolchain not found::No installed Xcode app provides Swift 6."
            ls -1 /Applications/Xcode*.app || true
            exit 1
          fi
          echo "DEVELOPER_DIR=$swift6_developer_dir" >> "$GITHUB_ENV"
          "$swift6_developer_dir/Toolchains/XcodeDefault.xctoolchain/usr/bin/swift" -version
      - name: Build release archive
        env:
          CHRONOFRAME_CODESIGN_IDENTITY: ${{ secrets.CHRONOFRAME_CODESIGN_IDENTITY }}
          CHRONOFRAME_DEVELOPMENT_TEAM: ${{ secrets.CHRONOFRAME_DEVELOPMENT_TEAM }}
          CHRONOFRAME_NOTARY_PROFILE: ${{ secrets.CHRONOFRAME_NOTARY_PROFILE }}
          CHRONOFRAME_NOTARY_APPLE_ID: ${{ secrets.CHRONOFRAME_NOTARY_APPLE_ID }}
          CHRONOFRAME_NOTARY_PASSWORD: ${{ secrets.CHRONOFRAME_NOTARY_PASSWORD }}
        run: |
          cd ui
          ./archive.sh
      - name: Create checksum
        run: |
          shasum -a 256 ui/build/Chronoframe-release.zip > ui/build/Chronoframe-release.zip.sha256
          cat ui/build/Chronoframe-release.zip.sha256
      - name: Ensure release exists
        if: inputs.upload
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null || \
            gh release create "$RELEASE_TAG" --draft --title "Chronoframe $RELEASE_TAG" --notes "Draft release package for Chronoframe $RELEASE_TAG."
      - name: Upload release assets
        if: inputs.upload
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          gh release upload "$RELEASE_TAG" \
            ui/build/Chronoframe-release.zip#Chronoframe.zip \
            ui/build/Chronoframe-release.zip.sha256#Chronoframe.zip.sha256 \
            --clobber
