name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * 1"

jobs:
  analyze-python:
    name: Analyze (Python)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: python
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

  analyze-swift:
    name: Analyze (Swift)
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual
      - name: Build Swift package product
        run: swift build --package-path ui --product ChronoframeApp
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"
