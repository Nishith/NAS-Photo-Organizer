name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    # Phase 1 finding (P1): restore CodeQL analysis on PRs so the gate
    # catches new sinks before merge instead of post-merge. The path
    # filter limits cost to PRs that actually touch analyzed code —
    # docs-only PRs, workflow tweaks, and shell-script changes don't
    # trigger the (slow) Swift CodeQL build.
    branches: ["main"]
    paths:
      - "ui/Sources/**"
      - "ui/Package.swift"
      - "ui/Chronoframe.xcodeproj/**"
      - ".github/workflows/codeql.yml"
  schedule:
    - cron: "0 0 * * 1"

concurrency:
  group: codeql-swift-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze-swift:
    name: Analyze (Swift)
    runs-on: macos-14
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Select Swift 6 toolchain
        run: |
          swift6_developer_dir=""
          for xcode in /Applications/Xcode*.app; do
            swift_binary="$xcode/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/swift"
            if [ -x "$swift_binary" ] && "$swift_binary" -version | grep -Eq 'Swift version 6\.'; then
              swift6_developer_dir="$xcode/Contents/Developer"
            fi
          done
          if [ -z "$swift6_developer_dir" ]; then
            echo "::error title=Swift 6 toolchain not found::No installed Xcode app provides Swift 6."
            ls -1 /Applications/Xcode*.app || true
            exit 1
          fi
          echo "DEVELOPER_DIR=$swift6_developer_dir" >> "$GITHUB_ENV"
          "$swift6_developer_dir/Toolchains/XcodeDefault.xctoolchain/usr/bin/swift" -version
      - uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          languages: swift
          build-mode: manual
      - name: Build Chronoframe app with SwiftPM
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p "$RUNNER_TEMP/swiftpm-home" "$RUNNER_TEMP/swiftpm-cache" "$RUNNER_TEMP/modulecache"
          HOME="$RUNNER_TEMP/swiftpm-home" \
          XDG_CACHE_HOME="$RUNNER_TEMP/swiftpm-cache" \
          CLANG_MODULE_CACHE_PATH="$RUNNER_TEMP/modulecache" \
          SWIFTPM_MODULECACHE_OVERRIDE="$RUNNER_TEMP/modulecache" \
            swift build --package-path ui --product ChronoframeApp
      - name: Build Chronoframe app with Xcode
        if: github.event_name != 'pull_request'
        run: |
          xcodebuild \
            -project ui/Chronoframe.xcodeproj \
            -scheme Chronoframe \
            -configuration Debug \
            -derivedDataPath "$RUNNER_TEMP/ChronoframeDerivedData" \
            -destination "generic/platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=x86_64 \
            ONLY_ACTIVE_ARCH=YES \
            build \
            -showBuildTimingSummary
      - uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4
        with:
          category: "/language:swift"
          # Code scanning is not currently enabled for this repository, so
          # SARIF uploads fail after analysis succeeds. Keep the CodeQL build
          # and analysis gate active for compiler/extraction failures, and
          # re-enable uploads after code scanning is turned on in repo settings.
          upload: never
