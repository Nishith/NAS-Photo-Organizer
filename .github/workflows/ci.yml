name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  whitespace:
    name: Whitespace check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: git diff --check

  swiftpm-tests:
    name: SwiftPM tests
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run SwiftPM tests
        run: |
          mkdir -p .tmp/home/Library/Caches .tmp/modulecache
          set +e
          HOME="$PWD/.tmp/home" \
          XDG_CACHE_HOME="$PWD/.tmp/home/Library/Caches" \
          CLANG_MODULE_CACHE_PATH="$PWD/.tmp/modulecache" \
          SWIFTPM_MODULECACHE_OVERRIDE="$PWD/.tmp/modulecache" \
          swift test --package-path ui --disable-sandbox 2>&1 | tee .tmp/swiftpm-tests.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            message=$(tail -80 .tmp/swiftpm-tests.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=SwiftPM tests failed::$message"
          fi
          exit "$status"

  meaningful-coverage:
    name: Meaningful Swift coverage
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run meaningful coverage gate
        run: |
          set +e
          script/swift_meaningful_coverage.sh 2>&1 | tee .tmp/meaningful-coverage.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            message=$(tail -80 .tmp/meaningful-coverage.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=Meaningful coverage failed::$message"
          fi
          exit "$status"

  xcode-build:
    name: Xcode build
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Build Chronoframe app
        run: |
          xcodebuild \
            -project ui/Chronoframe.xcodeproj \
            -scheme Chronoframe \
            -configuration Debug \
            -derivedDataPath "$RUNNER_TEMP/ChronoframeDerivedData" \
            -destination "generic/platform=macOS" \
              CODE_SIGNING_ALLOWED=NO \
              build

  xcode-ui-tests:
    name: Xcode UI tests
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run Chronoframe UI tests
        run: |
          xcodebuild \
            -project ui/Chronoframe.xcodeproj \
            -scheme Chronoframe \
            -configuration Debug \
            -derivedDataPath "$RUNNER_TEMP/ChronoframeUITestDerivedData" \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            test

  release-archive-smoke:
    name: Release archive smoke
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Build release archive
        run: |
          cd ui
          ./archive.sh --local
      - name: Check release archive
        run: |
          test -f ui/build/Chronoframe-release.zip
          shasum -a 256 ui/build/Chronoframe-release.zip
