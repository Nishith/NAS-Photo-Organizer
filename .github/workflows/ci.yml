name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  whitespace:
    name: Whitespace check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: git diff --check

  swiftpm-tests:
    name: SwiftPM tests
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Select Swift 6 toolchain
        run: |
          swift6_developer_dir=""
          for xcode in /Applications/Xcode*.app; do
            swift_binary="$xcode/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/swift"
            if [ -x "$swift_binary" ] && "$swift_binary" -version | grep -Eq 'Swift version 6\.'; then
              swift6_developer_dir="$xcode/Contents/Developer"
            fi
          done
          if [ -z "$swift6_developer_dir" ]; then
            echo "::error title=Swift 6 toolchain not found::No installed Xcode app provides Swift 6."
            ls -1 /Applications/Xcode*.app || true
            exit 1
          fi
          echo "DEVELOPER_DIR=$swift6_developer_dir" >> "$GITHUB_ENV"
          "$swift6_developer_dir/Toolchains/XcodeDefault.xctoolchain/usr/bin/swift" -version
      - name: Run SwiftPM tests
        run: |
          mkdir -p .tmp/home/Library/Caches .tmp/modulecache
          set +e
          HOME="$PWD/.tmp/home" \
          XDG_CACHE_HOME="$PWD/.tmp/home/Library/Caches" \
          CLANG_MODULE_CACHE_PATH="$PWD/.tmp/modulecache" \
          SWIFTPM_MODULECACHE_OVERRIDE="$PWD/.tmp/modulecache" \
          swift test --package-path ui --disable-sandbox 2>&1 | tee .tmp/swiftpm-tests.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            diagnostic=$(grep -E '(^error:|:[0-9]+: error:| failed \(|with [1-9][0-9]* failure|XCTAssert|Fatal error|signal|Test Case .* failed)' .tmp/swiftpm-tests.log | tail -80)
            if [ -z "$diagnostic" ]; then
              diagnostic=$(tail -80 .tmp/swiftpm-tests.log)
            fi
            message=$(printf '%s' "$diagnostic" | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=SwiftPM tests failed::$message"
          fi
          exit "$status"

  meaningful-coverage:
    name: Meaningful Swift coverage
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Select Swift 6 toolchain
        run: |
          swift6_developer_dir=""
          for xcode in /Applications/Xcode*.app; do
            swift_binary="$xcode/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/swift"
            if [ -x "$swift_binary" ] && "$swift_binary" -version | grep -Eq 'Swift version 6\.'; then
              swift6_developer_dir="$xcode/Contents/Developer"
            fi
          done
          if [ -z "$swift6_developer_dir" ]; then
            echo "::error title=Swift 6 toolchain not found::No installed Xcode app provides Swift 6."
            ls -1 /Applications/Xcode*.app || true
            exit 1
          fi
          echo "DEVELOPER_DIR=$swift6_developer_dir" >> "$GITHUB_ENV"
          "$swift6_developer_dir/Toolchains/XcodeDefault.xctoolchain/usr/bin/swift" -version
      - name: Run meaningful coverage gate
        run: |
          set +e
          script/swift_meaningful_coverage.sh 2>&1 | tee .tmp/meaningful-coverage.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            diagnostic=$(grep -E '(^error:|:[0-9]+: error:| failed \(|with [1-9][0-9]* failure|XCTAssert|Fatal error|signal|Test Case .* failed|Meaningful Swift coverage)' .tmp/meaningful-coverage.log | tail -80)
            if [ -z "$diagnostic" ]; then
              diagnostic=$(tail -80 .tmp/meaningful-coverage.log)
            fi
            message=$(printf '%s' "$diagnostic" | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=Meaningful coverage failed::$message"
          fi
          exit "$status"

  xcode-build:
    name: Xcode build
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Build Chronoframe app
        run: |
          xcodebuild \
            -project ui/Chronoframe.xcodeproj \
            -scheme Chronoframe \
            -configuration Debug \
            -derivedDataPath "$RUNNER_TEMP/ChronoframeDerivedData" \
            -destination "generic/platform=macOS" \
              CODE_SIGNING_ALLOWED=NO \
              build

  xcode-ui-tests:
    name: Xcode UI tests
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run Chronoframe UI tests
        run: |
          xcodebuild \
            -project ui/Chronoframe.xcodeproj \
            -scheme Chronoframe \
            -configuration Debug \
            -derivedDataPath "$RUNNER_TEMP/ChronoframeUITestDerivedData" \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            test

  release-archive-smoke:
    name: Release archive smoke
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Build release archive
        run: |
          cd ui
          ./archive.sh --local
      - name: Check release archive
        run: |
          test -f ui/build/Chronoframe-release.zip
          shasum -a 256 ui/build/Chronoframe-release.zip
