name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  whitespace:
    name: Whitespace check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: git diff --check

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install coverage pip-audit
      - name: Audit Python dependencies for CVEs
        run: pip-audit -r requirements.txt
      - name: Run Python test suite with coverage
        run: |
          coverage run -m unittest discover -s tests -t . -v
          coverage report --fail-under=95
          coverage xml
      - name: Upload Python coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-coverage
          path: coverage.xml
          retention-days: 30

  swiftpm-tests:
    name: SwiftPM tests
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run SwiftPM tests
        run: |
          mkdir -p .tmp/home/Library/Caches .tmp/modulecache
          HOME="$PWD/.tmp/home" \
          XDG_CACHE_HOME="$PWD/.tmp/home/Library/Caches" \
          CLANG_MODULE_CACHE_PATH="$PWD/.tmp/modulecache" \
          SWIFTPM_MODULECACHE_OVERRIDE="$PWD/.tmp/modulecache" \
          swift test --package-path ui --disable-sandbox

  meaningful-coverage:
    name: Meaningful Swift coverage
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run meaningful coverage gate
        run: script/swift_meaningful_coverage.sh

  xcode-build:
    name: Xcode build
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Build Chronoframe app
        run: |
          xcodebuild \
            -project ui/Chronoframe.xcodeproj \
            -scheme Chronoframe \
            -configuration Debug \
            -derivedDataPath "$RUNNER_TEMP/ChronoframeDerivedData" \
            -destination "generic/platform=macOS" \
              CODE_SIGNING_ALLOWED=NO \
              build

  xcode-ui-tests:
    name: Xcode UI tests
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run Chronoframe UI tests
        run: |
          xcodebuild \
            -project ui/Chronoframe.xcodeproj \
            -scheme Chronoframe \
            -configuration Debug \
            -derivedDataPath "$RUNNER_TEMP/ChronoframeUITestDerivedData" \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            test

  release-archive-smoke:
    name: Release archive smoke
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Build release archive
        run: |
          cd ui
          ./archive.sh --local
      - name: Check release archive
        run: |
          test -f ui/build/Chronoframe-release.zip
          shasum -a 256 ui/build/Chronoframe-release.zip
